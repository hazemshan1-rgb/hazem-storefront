<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <!-- Background dot grid -->
    <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="16" r="0.8" fill="#8B6914" opacity="0.18"/>
    </pattern>
    <!-- Radial vignette -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0F172A" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.55"/>
    </radialGradient>
    <!-- Gold shimmer gradient -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B6914"/>
      <stop offset="50%" stop-color="#CA8A04"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
  </defs>

  <!-- Base -->
  <rect width="800" height="600" fill="#0F172A"/>
  <rect width="800" height="600" fill="url(#dots)"/>
  <rect width="800" height="600" fill="url(#vignette)"/>

  <!-- Outer frame -->
  <rect x="18" y="18" width="764" height="564" fill="none" stroke="#8B6914" stroke-width="0.6" opacity="0.35"/>
  <rect x="26" y="26" width="748" height="548" fill="none" stroke="#8B6914" stroke-width="0.8" opacity="0.55"/>

  <!-- Biofloc circular motif — three nested circles, representing floc aggregates -->
  <circle cx="640" cy="300" r="180" fill="none" stroke="#8B6914" stroke-width="0.5" opacity="0.12"/>
  <circle cx="640" cy="300" r="130" fill="none" stroke="#CA8A04" stroke-width="0.5" opacity="0.16"/>
  <circle cx="640" cy="300" r="80" fill="none" stroke="#CA8A04" stroke-width="0.6" opacity="0.22"/>
  <circle cx="640" cy="300" r="35" fill="#CA8A04" opacity="0.06"/>
  <!-- Orbiting micro-floc dots -->
  <circle cx="640" cy="170" r="3" fill="#CA8A04" opacity="0.35"/>
  <circle cx="770" cy="300" r="2.5" fill="#CA8A04" opacity="0.3"/>
  <circle cx="640" cy="430" r="3" fill="#CA8A04" opacity="0.35"/>
  <circle cx="510" cy="300" r="2" fill="#CA8A04" opacity="0.25"/>
  <circle cx="695" cy="195" r="2" fill="#8B6914" opacity="0.4"/>
  <circle cx="695" cy="405" r="2" fill="#8B6914" opacity="0.4"/>
  <circle cx="585" cy="195" r="1.5" fill="#8B6914" opacity="0.3"/>
  <circle cx="585" cy="405" r="1.5" fill="#8B6914" opacity="0.3"/>

  <!-- Top category label -->
  <rect x="60" y="58" width="180" height="1" fill="url(#gold)" opacity="0.7"/>
  <text x="60" y="52" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#CA8A04" letter-spacing="3" opacity="0.9">EBOOK · FIELD GUIDE</text>

  <!-- Main title -->
  <text x="60" y="200" font-family="Georgia, 'Times New Roman', serif" font-size="52" font-weight="700" fill="#F1F5F9" letter-spacing="-0.5">Biofloc System</text>
  <text x="60" y="262" font-family="Georgia, 'Times New Roman', serif" font-size="52" font-weight="700" fill="#F1F5F9" letter-spacing="-0.5">Management</text>

  <!-- Gold rule under title -->
  <rect x="60" y="285" width="320" height="2" fill="url(#gold)" opacity="0.8"/>

  <!-- Subtitle -->
  <text x="60" y="318" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-style="italic" fill="#94A3B8">The Complete Field Guide</text>

  <!-- Body text -->
  <text x="60" y="370" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#64748B" letter-spacing="0.3">From floc establishment to harvest —</text>
  <text x="60" y="390" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#64748B" letter-spacing="0.3">the full operating manual for BFT systems.</text>

  <!-- Price badge -->
  <rect x="60" y="430" width="90" height="30" rx="2" fill="#CA8A04" opacity="0.12"/>
  <rect x="60" y="430" width="90" height="30" rx="2" fill="none" stroke="#CA8A04" stroke-width="0.8" opacity="0.5"/>
  <text x="105" y="450" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#CA8A04" text-anchor="middle" letter-spacing="1">$67</text>

  <!-- Author -->
  <text x="60" y="540" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#94A3B8" letter-spacing="2" opacity="0.8">HAZEM SHANNAK</text>
  <text x="60" y="556" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#475569" letter-spacing="1.5">30+ YEARS · 15 COUNTRIES</text>
</svg>
