<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560" width="400" height="560">
  <defs>
    <pattern id="dots-bf" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.7" fill="#8B6914" opacity="0.18"/>
    </pattern>
    <radialGradient id="glow-bf" cx="50%" cy="38%" r="55%">
      <stop offset="0%" stop-color="#CA8A04" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#0F172A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold-bf" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B6914"/>
      <stop offset="50%" stop-color="#CA8A04"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
  </defs>

  <!-- Base -->
  <rect width="400" height="560" fill="#0F172A"/>
  <rect width="400" height="560" fill="url(#dots-bf)"/>
  <rect width="400" height="560" fill="url(#glow-bf)"/>

  <!-- Frame -->
  <rect x="14" y="14" width="372" height="532" fill="none" stroke="#8B6914" stroke-width="0.5" opacity="0.3"/>
  <rect x="20" y="20" width="360" height="520" fill="none" stroke="#8B6914" stroke-width="0.7" opacity="0.45"/>

  <!-- Central warning motif — triangle -->
  <polygon points="200,88 260,188 140,188" fill="none" stroke="#CA8A04" stroke-width="1" opacity="0.22"/>
  <polygon points="200,102 248,185 152,185" fill="none" stroke="#CA8A04" stroke-width="0.6" opacity="0.15"/>
  <!-- Exclamation -->
  <rect x="197" y="120" width="6" height="42" rx="3" fill="#CA8A04" opacity="0.35"/>
  <circle cx="200" cy="172" r="4" fill="#CA8A04" opacity="0.35"/>
  <!-- Outer ring around triangle -->
  <circle cx="200" cy="148" r="72" fill="none" stroke="#8B6914" stroke-width="0.5" opacity="0.15" stroke-dasharray="4,6"/>

  <!-- Top label -->
  <rect x="40" y="38" width="140" height="1" fill="url(#gold-bf)" opacity="0.6"/>
  <text x="40" y="34" font-family="Georgia,'Times New Roman',serif" font-size="8.5" fill="#CA8A04" letter-spacing="3" opacity="0.9">FREE GUIDE · BIOFLOC</text>

  <!-- Title -->
  <text x="40" y="240" font-family="Georgia,'Times New Roman',serif" font-size="36" font-weight="700" fill="#F1F5F9" letter-spacing="-0.5">10 Ways</text>
  <text x="40" y="281" font-family="Georgia,'Times New Roman',serif" font-size="36" font-weight="700" fill="#F1F5F9" letter-spacing="-0.5">to Ruin a</text>
  <text x="40" y="322" font-family="Georgia,'Times New Roman',serif" font-size="36" font-weight="700" fill="#CA8A04" letter-spacing="-0.5">Biofloc</text>
  <text x="40" y="363" font-family="Georgia,'Times New Roman',serif" font-size="36" font-weight="700" fill="#F1F5F9" letter-spacing="-0.5">System</text>

  <!-- Gold rule -->
  <rect x="40" y="378" width="220" height="1.5" fill="url(#gold-bf)" opacity="0.75"/>

  <!-- Subtitle -->
  <text x="40" y="402" font-family="Georgia,'Times New Roman',serif" font-size="13" font-style="italic" fill="#94A3B8">The failure modes mapped</text>
  <text x="40" y="420" font-family="Georgia,'Times New Roman',serif" font-size="13" font-style="italic" fill="#94A3B8">so you avoid every one.</text>

  <!-- Free badge -->
  <rect x="40" y="452" width="68" height="26" rx="2" fill="#CA8A04" opacity="0.13"/>
  <rect x="40" y="452" width="68" height="26" rx="2" fill="none" stroke="#CA8A04" stroke-width="0.8" opacity="0.55"/>
  <text x="74" y="469" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="700" fill="#CA8A04" text-anchor="middle" letter-spacing="1">FREE</text>

  <!-- Author -->
  <text x="40" y="525" font-family="Arial,Helvetica,sans-serif" font-size="9.5" fill="#94A3B8" letter-spacing="2" opacity="0.8">HAZEM SHANNAK</text>
  <text x="40" y="539" font-family="Arial,Helvetica,sans-serif" font-size="8" fill="#475569" letter-spacing="1.5">30+ YEARS · 15 COUNTRIES</text>
</svg>
