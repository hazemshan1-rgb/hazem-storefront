<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <pattern id="dots4" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="16" r="0.7" fill="#8B6914" opacity="0.15"/>
    </pattern>
    <radialGradient id="vig4" cx="25%" cy="50%" r="72%">
      <stop offset="0%" stop-color="#0F172A" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.55"/>
    </radialGradient>
    <linearGradient id="gold4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B6914"/>
      <stop offset="50%" stop-color="#CA8A04"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
    <linearGradient id="bar-gold" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#8B6914" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#CA8A04" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="bar-muted" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="#0F172A"/>
  <rect width="800" height="600" fill="url(#dots4)"/>
  <rect width="800" height="600" fill="url(#vig4)"/>

  <!-- Frame -->
  <rect x="18" y="18" width="764" height="564" fill="none" stroke="#8B6914" stroke-width="0.6" opacity="0.35"/>
  <rect x="26" y="26" width="748" height="548" fill="none" stroke="#8B6914" stroke-width="0.8" opacity="0.5"/>

  <!-- FCR bar chart motif — right side, improving trend -->
  <!-- Axis lines -->
  <line x1="460" y1="160" x2="460" y2="440" stroke="#8B6914" stroke-width="0.6" opacity="0.35"/>
  <line x1="460" y1="440" x2="760" y2="440" stroke="#8B6914" stroke-width="0.6" opacity="0.35"/>
  <!-- Y axis labels -->
  <text x="450" y="228" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#475569" text-anchor="end">2.4</text>
  <text x="450" y="288" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#475569" text-anchor="end">2.0</text>
  <text x="450" y="348" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#475569" text-anchor="end">1.6</text>
  <text x="450" y="408" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#CA8A04" text-anchor="end" opacity="0.9">1.2</text>
  <!-- Gridlines -->
  <line x1="460" y1="228" x2="760" y2="228" stroke="#8B6914" stroke-width="0.3" stroke-dasharray="4,4" opacity="0.2"/>
  <line x1="460" y1="288" x2="760" y2="288" stroke="#8B6914" stroke-width="0.3" stroke-dasharray="4,4" opacity="0.2"/>
  <line x1="460" y1="348" x2="760" y2="348" stroke="#8B6914" stroke-width="0.3" stroke-dasharray="4,4" opacity="0.2"/>
  <!-- Target line -->
  <line x1="460" y1="408" x2="760" y2="408" stroke="#CA8A04" stroke-width="0.8" stroke-dasharray="6,3" opacity="0.5"/>
  <text x="762" y="412" font-family="Arial, Helvetica, sans-serif" font-size="7.5" fill="#CA8A04" opacity="0.7">target</text>
  <!-- Bars — showing improvement over batches -->
  <!-- Batch 1: FCR 2.2 -->
  <rect x="480" y="258" width="32" height="182" rx="1" fill="url(#bar-muted)" opacity="0.7"/>
  <text x="496" y="455" font-family="Arial, Helvetica, sans-serif" font-size="7.5" fill="#475569" text-anchor="middle">B1</text>
  <text x="496" y="252" font-family="Arial, Helvetica, sans-serif" font-size="7.5" fill="#64748B" text-anchor="middle">2.2</text>
  <!-- Batch 2: FCR 2.05 -->
  <rect x="524" y="268" width="32" height="172" rx="1" fill="url(#bar-muted)" opacity="0.75"/>
  <text x="540" y="455" font-family="Arial, Helvetica, sans-serif" font-size="7.5" fill="#475569" text-anchor="middle">B2</text>
  <!-- Batch 3: FCR 1.9 -->
  <rect x="568" y="279" width="32" height="161" rx="1" fill="url(#bar-muted)" opacity="0.8"/>
  <text x="584" y="455" font-family="Arial, Helvetica, sans-serif" font-size="7.5" fill="#475569" text-anchor="middle">B3</text>
  <!-- Batch 4: FCR 1.7 -->
  <rect x="612" y="298" width="32" height="142" rx="1" fill="url(#bar-muted)" opacity="0.85"/>
  <text x="628" y="455" font-family="Arial, Helvetica, sans-serif" font-size="7.5" fill="#475569" text-anchor="middle">B4</text>
  <!-- Batch 5: FCR 1.45 — highlighted gold -->
  <rect x="656" y="325" width="32" height="115" rx="1" fill="url(#bar-gold)"/>
  <text x="672" y="455" font-family="Arial, Helvetica, sans-serif" font-size="7.5" fill="#CA8A04" text-anchor="middle">B5</text>
  <text x="672" y="318" font-family="Arial, Helvetica, sans-serif" font-size="7.5" fill="#CA8A04" text-anchor="middle" font-weight="700">1.45</text>
  <!-- Improvement arrow -->
  <line x1="496" y1="240" x2="672" y2="310" stroke="#CA8A04" stroke-width="0.7" stroke-dasharray="3,3" opacity="0.5"/>
  <!-- X axis label -->
  <text x="608" y="472" font-family="Arial, Helvetica, sans-serif" font-size="7.5" fill="#475569" text-anchor="middle" letter-spacing="1">PRODUCTION BATCHES</text>

  <!-- Category -->
  <text x="60" y="52" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#CA8A04" letter-spacing="3" opacity="0.9">TOOLKIT · DIAGNOSTICS</text>
  <rect x="60" y="58" width="160" height="1" fill="url(#gold4)" opacity="0.7"/>

  <!-- Title -->
  <text x="60" y="200" font-family="Georgia, 'Times New Roman', serif" font-size="50" font-weight="700" fill="#F1F5F9" letter-spacing="-0.5">Shrimp FCR</text>
  <text x="60" y="258" font-family="Georgia, 'Times New Roman', serif" font-size="50" font-weight="700" fill="#F1F5F9" letter-spacing="-0.5">Optimisation</text>
  <rect x="60" y="278" width="320" height="2" fill="url(#gold4)" opacity="0.8"/>
  <text x="60" y="311" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-style="italic" fill="#94A3B8">Toolkit</text>

  <text x="60" y="363" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#64748B">Diagnostic spreadsheet + field guide</text>
  <text x="60" y="383" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#64748B">for closing your FCR gap.</text>

  <rect x="60" y="422" width="80" height="30" rx="2" fill="none" stroke="#CA8A04" stroke-width="0.8" opacity="0.5"/>
  <text x="100" y="442" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#CA8A04" text-anchor="middle" letter-spacing="1">$97</text>

  <text x="60" y="540" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#94A3B8" letter-spacing="2" opacity="0.8">HAZEM SHANNAK</text>
  <text x="60" y="556" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#475569" letter-spacing="1.5">30+ YEARS · 15 COUNTRIES</text>
</svg>
