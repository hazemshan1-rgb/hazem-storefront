  <text x="60" y="308" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-style="italic" fill="#94A3B8">SOP Pack</text>

  <text x="60" y="360" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#64748B">Daily, weekly &amp; cycle-end protocols</text>
  <text x="60" y="380" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#64748B">for farm supervisors.</text>

  <rect x="60" y="420" width="80" height="30" rx="2" fill="none" stroke="#CA8A04" stroke-width="0.8" opacity="0.5"/>
  <text x="100" y="440" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#CA8A04" text-anchor="middle" letter-spacing="1">$67</text>

  <text x="60" y="540" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#94A3B8" letter-spacing="2" opacity="0.8">HAZEM SHANNAK</text>
