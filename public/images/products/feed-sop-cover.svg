<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <pattern id="grid" x="0" y="0" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#8B6914" stroke-width="0.3" opacity="0.15"/>
    </pattern>
    <radialGradient id="vig2" cx="30%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#0F172A" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.5"/>
    </radialGradient>
    <linearGradient id="gold2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B6914"/>
      <stop offset="50%" stop-color="#CA8A04"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="#0F172A"/>
  <rect width="800" height="600" fill="url(#grid)"/>
  <rect width="800" height="600" fill="url(#vig2)"/>

  <!-- Frame -->
  <rect x="18" y="18" width="764" height="564" fill="none" stroke="#8B6914" stroke-width="0.6" opacity="0.35"/>
  <rect x="26" y="26" width="748" height="548" fill="none" stroke="#8B6914" stroke-width="0.8" opacity="0.5"/>

