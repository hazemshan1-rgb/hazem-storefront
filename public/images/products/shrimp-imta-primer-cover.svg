<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560" width="400" height="560">
  <defs>
    <pattern id="dots-im" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.7" fill="#8B6914" opacity="0.18"/>
    </pattern>
    <radialGradient id="glow-im" cx="50%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#CA8A04" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0F172A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold-im" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B6914"/>
      <stop offset="50%" stop-color="#CA8A04"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
  </defs>

  <!-- Base -->
  <rect width="400" height="560" fill="#0F172A"/>
  <rect width="400" height="560" fill="url(#dots-im)"/>
  <rect width="400" height="560" fill="url(#glow-im)"/>

  <!-- Frame -->
  <rect x="14" y="14" width="372" height="532" fill="none" stroke="#8B6914" stroke-width="0.5" opacity="0.3"/>
  <rect x="20" y="20" width="360" height="520" fill="none" stroke="#8B6914" stroke-width="0.7" opacity="0.45"/>

  <!-- IMTA orbital motif centred in upper half -->
  <circle cx="200" cy="152" r="100" fill="none" stroke="#8B6914" stroke-width="0.7" opacity="0.18"/>
  <circle cx="200" cy="152" r="68"  fill="none" stroke="#CA8A04" stroke-width="0.8" opacity="0.22"/>
  <circle cx="200" cy="152" r="36"  fill="none" stroke="#CA8A04" stroke-width="1"   opacity="0.30"/>
  <circle cx="200" cy="152" r="12"  fill="#CA8A04" opacity="0.08"/>
  <circle cx="200" cy="52"  r="4"   fill="#CA8A04" opacity="0.5"/>
  <circle cx="200" cy="52"  r="9"   fill="none" stroke="#CA8A04" stroke-width="0.5" opacity="0.22"/>
  <circle cx="300" cy="152" r="3.5" fill="#CA8A04" opacity="0.42"/>
  <circle cx="300" cy="152" r="8"   fill="none" stroke="#CA8A04" stroke-width="0.5" opacity="0.18"/>
  <circle cx="200" cy="252" r="4"   fill="#CA8A04" opacity="0.5"/>
  <circle cx="200" cy="252" r="9"   fill="none" stroke="#CA8A04" stroke-width="0.5" opacity="0.22"/>
  <circle cx="100" cy="152" r="3"   fill="#8B6914" opacity="0.38"/>
  <line x1="200" y1="52"  x2="300" y2="152" stroke="#CA8A04" stroke-width="0.4" stroke-dasharray="3,5" opacity="0.2"/>
  <line x1="300" y1="152" x2="200" y2="252" stroke="#CA8A04" stroke-width="0.4" stroke-dasharray="3,5" opacity="0.2"/>
  <line x1="200" y1="252" x2="100" y2="152" stroke="#8B6914" stroke-width="0.4" stroke-dasharray="3,5" opacity="0.15"/>
  <line x1="100" y1="152" x2="200" y2="52"  stroke="#8B6914" stroke-width="0.4" stroke-dasharray="3,5" opacity="0.15"/>

  <!-- Top label -->
  <rect x="40" y="38" width="140" height="1" fill="url(#gold-im)" opacity="0.6"/>
  <text x="40" y="34" font-family="Georgia,'Times New Roman',serif" font-size="8.5" fill="#CA8A04" letter-spacing="3" opacity="0.9">EBOOK · PRIMER</text>

  <!-- Title -->
  <text x="40" y="308" font-family="Georgia,'Times New Roman',serif" font-size="38" font-weight="700" fill="#F1F5F9" letter-spacing="-0.5">The Shrimp</text>
  <text x="40" y="355" font-family="Georgia,'Times New Roman',serif" font-size="38" font-weight="700" fill="#CA8A04" letter-spacing="-0.5">IMTA Primer</text>

  <!-- Gold rule -->
  <rect x="40" y="370" width="260" height="1.5" fill="url(#gold-im)" opacity="0.75"/>

  <!-- Subtitle -->
  <text x="40" y="395" font-family="Georgia,'Times New Roman',serif" font-size="13" font-style="italic" fill="#94A3B8">Three crops, one pond,</text>
  <text x="40" y="413" font-family="Georgia,'Times New Roman',serif" font-size="13" font-style="italic" fill="#94A3B8">better margins.</text>

  <!-- Price badge -->
  <rect x="40" y="445" width="72" height="26" rx="2" fill="#CA8A04" opacity="0.13"/>
  <rect x="40" y="445" width="72" height="26" rx="2" fill="none" stroke="#CA8A04" stroke-width="0.8" opacity="0.55"/>
  <text x="76" y="462" font-family="Arial,Helvetica,sans-serif" font-size="12" font-weight="700" fill="#CA8A04" text-anchor="middle" letter-spacing="1">$27</text>
  <text x="124" y="462" font-family="Arial,Helvetica,sans-serif" font-size="9" fill="#475569" letter-spacing="1.5">· COMING SOON</text>

  <!-- Author -->
  <text x="40" y="525" font-family="Arial,Helvetica,sans-serif" font-size="9.5" fill="#94A3B8" letter-spacing="2" opacity="0.8">HAZEM SHANNAK</text>
  <text x="40" y="539" font-family="Arial,Helvetica,sans-serif" font-size="8" fill="#475569" letter-spacing="1.5">30+ YEARS · 15 COUNTRIES</text>
</svg>
