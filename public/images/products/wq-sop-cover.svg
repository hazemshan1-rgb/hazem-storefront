<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <pattern id="dots3" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="0.7" fill="#8B6914" opacity="0.16"/>
    </pattern>
    <radialGradient id="vig3" cx="70%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0F172A" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.55"/>
    </radialGradient>
    <linearGradient id="gold3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B6914"/>
      <stop offset="50%" stop-color="#CA8A04"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
    <!-- Water ripple gradient -->
    <radialGradient id="water" cx="65%" cy="62%" r="45%">
      <stop offset="0%" stop-color="#1E3A5F" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0F172A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="800" height="600" fill="#0F172A"/>
  <rect width="800" height="600" fill="url(#dots3)"/>
  <!-- Subtle water-tone wash on right -->
  <rect width="800" height="600" fill="url(#water)"/>
  <rect width="800" height="600" fill="url(#vig3)"/>

  <!-- Frame -->
  <rect x="18" y="18" width="764" height="564" fill="none" stroke="#8B6914" stroke-width="0.6" opacity="0.35"/>
  <rect x="26" y="26" width="748" height="548" fill="none" stroke="#8B6914" stroke-width="0.8" opacity="0.5"/>

  <!-- Water ripple motif — concentric ellipses on right half -->
  <ellipse cx="620" cy="320" rx="200" ry="80" fill="none" stroke="#1E4A8A" stroke-width="0.6" opacity="0.25"/>
  <ellipse cx="620" cy="320" rx="155" ry="60" fill="none" stroke="#1E6AAA" stroke-width="0.5" opacity="0.2"/>
  <ellipse cx="620" cy="320" rx="110" ry="42" fill="none" stroke="#CA8A04" stroke-width="0.5" opacity="0.18"/>
  <ellipse cx="620" cy="320" rx="68" ry="26" fill="none" stroke="#CA8A04" stroke-width="0.6" opacity="0.28"/>
  <ellipse cx="620" cy="320" rx="32" ry="12" fill="#CA8A04" opacity="0.05"/>

  <!-- Parameter response matrix preview -->
  <text x="490" y="168" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#CA8A04" letter-spacing="2" opacity="0.7">RESPONSE MATRIX</text>
  <!-- Row: DO -->
  <rect x="490" y="175" width="258" height="22" fill="none" stroke="#8B6914" stroke-width="0.4" opacity="0.25"/>
  <text x="498" y="191" font-family="Arial, Helvetica, sans-serif" font-size="8.5" fill="#475569">DO &lt; 4 mg/L</text>
  <rect x="618" y="177" width="62" height="18" rx="2" fill="#8B0000" opacity="0.35"/>
  <text x="649" y="191" font-family="Arial, Helvetica, sans-serif" font-size="7.5" fill="#FCA5A5" text-anchor="middle">CRITICAL</text>
  <!-- Row: pH -->
  <rect x="490" y="197" width="258" height="22" fill="none" stroke="#8B6914" stroke-width="0.4" opacity="0.25"/>
  <text x="498" y="213" font-family="Arial, Helvetica, sans-serif" font-size="8.5" fill="#475569">pH 7.5 – 8.5</text>
  <rect x="618" y="199" width="62" height="18" rx="2" fill="#14532D" opacity="0.35"/>
  <text x="649" y="213" font-family="Arial, Helvetica, sans-serif" font-size="7.5" fill="#86EFAC" text-anchor="middle">NORMAL</text>
  <!-- Row: NH3 -->
  <rect x="490" y="219" width="258" height="22" fill="none" stroke="#8B6914" stroke-width="0.4" opacity="0.25"/>
  <text x="498" y="235" font-family="Arial, Helvetica, sans-serif" font-size="8.5" fill="#475569">NH₃ &gt; 0.1 mg/L</text>
  <rect x="618" y="221" width="62" height="18" rx="2" fill="#7C2D12" opacity="0.35"/>
  <text x="649" y="235" font-family="Arial, Helvetica, sans-serif" font-size="7.5" fill="#FED7AA" text-anchor="middle">ACT NOW</text>
  <!-- Row: Alk -->
  <rect x="490" y="241" width="258" height="22" fill="none" stroke="#8B6914" stroke-width="0.4" opacity="0.25"/>
  <text x="498" y="257" font-family="Arial, Helvetica, sans-serif" font-size="8.5" fill="#475569">Alk &lt; 80 mg/L</text>
  <rect x="618" y="243" width="62" height="18" rx="2" fill="#78350F" opacity="0.35"/>
  <text x="649" y="257" font-family="Arial, Helvetica, sans-serif" font-size="7.5" fill="#FDE68A" text-anchor="middle">DOSE</text>

  <!-- Category -->
  <text x="60" y="52" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#CA8A04" letter-spacing="3" opacity="0.9">SOP PACK · WATER QUALITY</text>
  <rect x="60" y="58" width="195" height="1" fill="url(#gold3)" opacity="0.7"/>

  <!-- Title -->
  <text x="60" y="200" font-family="Georgia, 'Times New Roman', serif" font-size="46" font-weight="700" fill="#F1F5F9" letter-spacing="-0.5">Water Quality</text>
  <text x="60" y="255" font-family="Georgia, 'Times New Roman', serif" font-size="46" font-weight="700" fill="#F1F5F9" letter-spacing="-0.5">&amp; Aeration</text>
  <rect x="60" y="272" width="310" height="2" fill="url(#gold3)" opacity="0.8"/>
  <text x="60" y="305" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-style="italic" fill="#94A3B8">Management SOP</text>

  <text x="60" y="357" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#64748B">The measurement schedule and</text>
  <text x="60" y="377" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#64748B">response matrix your crew needs.</text>

  <rect x="60" y="418" width="80" height="30" rx="2" fill="none" stroke="#CA8A04" stroke-width="0.8" opacity="0.5"/>
  <text x="100" y="438" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#CA8A04" text-anchor="middle" letter-spacing="1">$47</text>

  <text x="60" y="540" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#94A3B8" letter-spacing="2" opacity="0.8">HAZEM SHANNAK</text>
  <text x="60" y="556" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#475569" letter-spacing="1.5">30+ YEARS · 15 COUNTRIES</text>
</svg>
